<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Southern Ocean Literature Radar</title>
    <link rel="stylesheet" href="styles.css?v=20260613">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Filters">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Literature Radar</h1>
            <p>Sea ice, Southern Ocean, carbon uptake</p>
          </div>
        </div>

        <label class="field">
          <span>Week</span>
          <select id="weekSelect"></select>
        </label>

        <label class="field">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Title, author, DOI, tag">
        </label>

        <label class="field">
          <span>Paper Type</span>
          <select id="typeSelect">
            <option value="all">All types</option>
          </select>
        </label>

        <label class="field">
          <span>Status</span>
          <select id="statusSelect">
            <option value="all">All status</option>
            <option value="to_read">To read</option>
            <option value="reading">Reading</option>
            <option value="done">Done</option>
            <option value="ignore">Ignore</option>
          </select>
        </label>

        <div class="field">
          <span>Tags</span>
          <div id="tagFilters" class="tag-grid"></div>
        </div>

        <button id="addPaperButton" class="sidebar-action" type="button">+ Add Paper</button>
      </aside>

      <main class="content">
        <section class="top-band" aria-labelledby="briefTitle">
          <div>
            <p id="briefDate" class="eyebrow"></p>
            <h2 id="briefTitle"></h2>
            <p id="briefSummary" class="brief-text"></p>
          </div>
          <div class="stat-strip" aria-label="Weekly metrics">
            <div>
              <strong id="paperCount">0</strong>
              <span>Papers</span>
            </div>
            <div>
              <strong id="readFirstCount">0</strong>
              <span>Read first</span>
            </div>
            <div>
              <strong id="preprintCount">0</strong>
              <span>Preprints</span>
            </div>
          </div>
        </section>

        <section class="workspace" aria-label="Papers">
          <div class="paper-column">
            <div class="toolbar">
              <div class="segmented" role="group" aria-label="Sort">
                <button class="sort-button is-active" data-sort="relevance">Relevance</button>
                <button class="sort-button" data-sort="date">Newest</button>
                <button class="sort-button" data-sort="priority">Priority</button>
              </div>
              <button id="exportButton" class="icon-button" title="Export filtered records" aria-label="Export filtered records">
                <span aria-hidden="true">JSON</span>
              </button>
            </div>
            <div id="paperList" class="paper-list"></div>
          </div>

          <aside class="detail-panel" aria-label="Paper details">
            <div id="detailEmpty" class="empty-detail">Select a paper</div>
            <article id="paperDetail" class="paper-detail" hidden>
              <div class="detail-header">
                <span id="detailPriority" class="priority-pill"></span>
                <select id="detailStatus" class="status-select" aria-label="Reading status">
                  <option value="to_read">To read</option>
                  <option value="reading">Reading</option>
                  <option value="done">Done</option>
                  <option value="ignore">Ignore</option>
                </select>
              </div>
              <h3 id="detailTitle"></h3>
              <p id="detailCitation" class="citation"></p>
              <div id="detailTags" class="tag-row"></div>

              <dl class="metadata-list">
                <div>
                  <dt>Published</dt>
                  <dd id="detailDate"></dd>
                </div>
                <div>
                  <dt>Type</dt>
                  <dd id="detailType"></dd>
                </div>
                <div>
                  <dt>Relevance</dt>
                  <dd id="detailRelevance"></dd>
                </div>
              </dl>

              <section>
                <h4>Summary</h4>
                <p id="detailSummary"></p>
              </section>
              <section>
                <h4>Why It Matters</h4>
                <p id="detailWhy"></p>
              </section>
              <section>
                <h4>Caveats</h4>
                <p id="detailCaveats"></p>
              </section>

              <label class="notes-box">
                <span>Notes</span>
                <textarea id="detailNotes" rows="7"></textarea>
              </label>

              <div class="action-row">
                <a id="doiLink" class="link-button" href="#" target="_blank" rel="noreferrer">DOI</a>
                <a id="sourceLink" class="link-button" href="#" target="_blank" rel="noreferrer">Source</a>
                <button id="copyCitationButton" class="link-button" type="button">Copy Citation</button>
              </div>
            </article>
          </aside>
        </section>
      </main>
    </div>

    <div id="manualBackdrop" class="manual-backdrop" hidden></div>
    <aside id="manualPanel" class="manual-panel" aria-label="Add paper" hidden>
      <form id="manualForm" class="manual-form">
        <div class="manual-header">
          <div>
            <p class="eyebrow">Local Draft</p>
            <h2>Add Paper</h2>
          </div>
          <button id="closeManualButton" class="icon-button" type="button" aria-label="Close add paper panel">Close</button>
        </div>

        <div id="manualStatus" class="manual-status" role="status"></div>

        <label class="field">
          <span>Drafts</span>
          <select id="manualDraftSelect">
            <option value="">New draft</option>
          </select>
        </label>

        <div class="manual-grid two">
          <label class="field">
            <span>Month</span>
            <input id="manualMonth" type="month" required>
          </label>
          <label class="field">
            <span>Published Date</span>
            <input id="manualPublishedDate" type="date">
          </label>
        </div>

        <div class="manual-grid two">
          <label class="field">
            <span>DOI</span>
            <input id="manualDoi" type="text" placeholder="10.xxxx/xxxxx">
          </label>
          <label class="field">
            <span>URL</span>
            <input id="manualUrl" type="url" placeholder="https://...">
          </label>
        </div>

        <button id="normalizeLinkButton" class="link-button" type="button">Normalize DOI / URL</button>

        <label class="field">
          <span>Title</span>
          <input id="manualTitle" type="text" required>
        </label>

        <label class="field">
          <span>Authors</span>
          <textarea id="manualAuthors" rows="3" placeholder="Separate authors with semicolons or new lines"></textarea>
        </label>

        <div class="manual-grid three">
          <label class="field">
            <span>Year</span>
            <input id="manualYear" type="number" min="1900" max="2100">
          </label>
          <label class="field">
            <span>Source</span>
            <input id="manualSource" type="text" placeholder="Journal or preprint server">
          </label>
          <label class="field">
            <span>Paper Type</span>
            <select id="manualPaperType">
              <option value="peer-reviewed">peer-reviewed</option>
              <option value="preprint">preprint</option>
              <option value="review">review</option>
              <option value="dataset">dataset</option>
              <option value="methods">methods</option>
              <option value="news">news</option>
            </select>
          </label>
        </div>

        <div class="manual-grid three">
          <label class="field">
            <span>Priority</span>
            <select id="manualPriority">
              <option value="track">track</option>
              <option value="read_first">read_first</option>
              <option value="background">background</option>
              <option value="low">low</option>
            </select>
          </label>
          <label class="field">
            <span>Relevance</span>
            <input id="manualRelevance" type="number" min="0" max="1" step="0.01" value="0.7">
          </label>
          <label class="field">
            <span>Link Quality</span>
            <select id="manualLinkQuality">
              <option value="doi">doi</option>
              <option value="journal_page">journal_page</option>
              <option value="preprint">preprint</option>
              <option value="news_only">news_only</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>Summary</span>
          <textarea id="manualSummary" rows="4"></textarea>
        </label>

        <label class="field">
          <span>Why It Matters</span>
          <textarea id="manualWhy" rows="4"></textarea>
        </label>

        <label class="field">
          <span>Caveats</span>
          <textarea id="manualCaveats" rows="3"></textarea>
        </label>

        <label class="field">
          <span>Tags</span>
          <input id="manualTags" type="text" placeholder="Southern Ocean, sea ice, carbon uptake">
        </label>

        <label class="field">
          <span>Generated Record</span>
          <textarea id="manualOutput" rows="10" readonly></textarea>
        </label>

        <div class="manual-actions">
          <button id="saveDraftButton" class="link-button" type="button">Save Draft</button>
          <button id="copyRecordButton" class="link-button" type="button">Copy JS Record</button>
          <button id="downloadJsonButton" class="link-button" type="button">Download JSON</button>
          <button id="downloadJsButton" class="link-button" type="button">Download JS</button>
          <button id="deleteDraftButton" class="link-button danger" type="button">Delete Draft</button>
          <button id="clearManualButton" class="link-button" type="button">Clear</button>
        </div>
      </form>
    </aside>

    <script src="data/manifest.js?v=20260526"></script>
    <script src="app.js?v=20260613"></script>
  </body>
</html>
